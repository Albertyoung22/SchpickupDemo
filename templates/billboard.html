<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📢 學生接送即時看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f9ff;
            --text: #0f172a;
            --primary: #0284c7;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Microsoft JhengHei', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 3vh 6vw;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 5vh;
            font-weight: 900;
            color: #0369a1;
            letter-spacing: -1px;
        }

        .clock {
            font-size: 7vh;
            font-weight: 900;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .billboard-container {
            flex: 1;
            padding: 3vh 6vw;
            display: flex;
            flex-direction: column;
            gap: 2.5vh;
            overflow-y: hidden;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4vh 6vw;
            background: #ffffff;
            border-radius: 3vh;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-left: 25px solid #cbd5e1;
            animation: slideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            position: relative;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .row.type-arrived {
            border-left-color: var(--danger);
            background: #fff1f2;
        }

        .row.type-soon {
            border-left-color: var(--warning);
            background: #fffbeb;
        }

        .row.type-thanks {
            border-left-color: var(--success);
            background: #f0fdf4;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 5vw;
        }

        .student-name {
            font-size: 11vh;
            font-weight: 900;
            color: #1e293b;
        }

        .status-badge {
            font-size: 6vh;
            padding: 1.5vh 4vw;
            border-radius: 2vh;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .row.type-arrived .status-badge {
            color: #fff;
            background: var(--danger);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
        }

        .row.type-soon .status-badge {
            color: #fff;
            background: var(--warning);
            box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4);
        }

        .row.type-thanks .status-badge {
            color: #fff;
            background: var(--success);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .arrival-time {
            font-size: 6vh;
            font-weight: 700;
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
        }

        /* Newest Highlight */
        .row:first-child {
            z-index: 10;
            transform: scale(1.03);
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.1);
        }

        .row:first-child.type-arrived {
            animation: glowRed 1.5s infinite ease-in-out;
        }

        @keyframes glowRed {
            0% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            }

            50% {
                box-shadow: 0 0 60px rgba(239, 68, 68, 0.5);
            }

            100% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            }
        }

        .audio-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }

        .audio-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .audio-overlay span {
            font-size: 8vh;
            font-weight: 900;
        }

        .no-data {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 7vh;
            color: #94a3b8;
            font-weight: 700;
            gap: 2vh;
        }
    </style>
</head>

<body>
    <div id="audioUnlock" class="audio-overlay" onclick="unlockAudio()">
        <span>🔊 點擊任意處開始啟用語音播報</span>
    </div>

    <header>
        <div class="title">CAMPUS PICKUP LIVE</div>
        <div id="clock" class="clock">00:00:00</div>
    </header>

    <div id="billboard" class="billboard-container">
        <div class="no-data">🍃 靜候放學廣播中...</div>
    </div>

    <script>
        let lastHistoryHash = "";
        let audioQueue = [];
        let isPlaying = false;
        let audioUnlocked = false;

        function unlockAudio() {
            if (audioUnlocked) return;
            // Play a silent audio or empty sound to unlock context
            const silentAudio = new Audio();
            silentAudio.src = "data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqy=";
            silentAudio.play().catch(e => console.log(e));
            audioUnlocked = true;
            document.getElementById('audioUnlock').classList.add('hidden');
        }

        // Wait to ensure audio URL is accessible (max retries)
        async function checkAudioReady(url, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, { method: 'HEAD' });
                    if (res.ok) return true;
                } catch (e) { }
                await new Promise(r => setTimeout(r, delay));
            }
            return false;
        }

        async function playAudio(url) {
            return new Promise((resolve) => {
                const audio = new Audio(url);
                audio.onended = resolve;
                audio.onerror = resolve;
                audio.play().catch(e => {
                    console.error("Audio block:", e);
                    resolve();
                });
            });
        }

        async function processAudioQueue() {
            if (isPlaying || audioQueue.length === 0) return;
            isPlaying = true;
            while (audioQueue.length > 0) {
                const url = audioQueue.shift();
                const isReady = await checkAudioReady(url, 10, 1000); // give TTS some time to generate
                if (isReady && audioUnlocked) {
                    await playAudio(url);
                }
            }
            isPlaying = false;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function poll() {
            try {
                const res = await fetch('/api/poll');
                const data = await res.json();
                const currentHash = JSON.stringify(data.history);
                if (currentHash === lastHistoryHash) return;
                
                // Diff and push audio to queue
                if (lastHistoryHash !== "") {
                    const oldObj = JSON.parse(lastHistoryHash);
                    const oldKeys = new Set(oldObj.map(x => x.name + x.time));
                    const newItems = data.history.filter(x => !oldKeys.has(x.name + x.time)).reverse();
                    
                    for (let item of newItems) {
                        if (item.audio_url) audioQueue.push(item.audio_url);
                    }
                    processAudioQueue();
                }

                lastHistoryHash = currentHash;
                updateBillboard(data.history);
            } catch (err) { console.error("Poll error:", err); }
        }

        function updateBillboard(history) {
            const container = document.getElementById('billboard');
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="no-data">🍃 目前無接送資訊</div>';
                return;
            }

            container.innerHTML = history.slice(0, 5).map(item => `
                <div class="row ${item.class || ''}">
                    <div class="student-info">
                        <div class="student-name">${item.name}</div>
                        <div class="status-badge">${item.status}</div>
                    </div>
                    <div class="arrival-time">${item.time}</div>
                </div>
            `).join('');
        }

        setInterval(poll, 2500);
        poll();
    </script>
</body>

</html>
