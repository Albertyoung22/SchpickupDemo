<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📢 學生接送即時看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f9ff;
            --text: #0f172a;
            --primary: #0284c7;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Microsoft JhengHei', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 3vh 6vw;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 5vh;
            font-weight: 900;
            color: #0369a1;
            letter-spacing: -1px;
        }

        .clock {
            font-size: 7vh;
            font-weight: 900;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .billboard-container {
            flex: 1;
            padding: 3vh 6vw;
            display: flex;
            flex-direction: column;
            gap: 2.5vh;
            overflow-y: hidden;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4vh 6vw;
            background: #ffffff;
            border-radius: 3vh;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-left: 25px solid #cbd5e1;
            animation: slideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            position: relative;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .row.type-arrived {
            border-left-color: var(--danger);
            background: #fff1f2;
        }

        .row.type-soon {
            border-left-color: var(--warning);
            background: #fffbeb;
        }

        .row.type-thanks {
            border-left-color: var(--success);
            background: #f0fdf4;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 5vw;
        }

        .student-name {
            font-size: 11vh;
            font-weight: 900;
            color: #1e293b;
        }

        .status-badge {
            font-size: 6vh;
            padding: 1.5vh 4vw;
            border-radius: 2vh;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .row.type-arrived .status-badge {
            color: #fff;
            background: var(--danger);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
        }

        .row.type-soon .status-badge {
            color: #fff;
            background: var(--warning);
            box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4);
        }

        .row.type-thanks .status-badge {
            color: #fff;
            background: var(--success);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .arrival-time {
            font-size: 6vh;
            font-weight: 700;
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
        }

        /* Newest Highlight */
        .row:first-child {
            z-index: 10;
            transform: scale(1.03);
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.1);
        }

        .row:first-child.type-arrived {
            animation: glowRed 1.5s infinite ease-in-out;
        }

        @keyframes glowRed {
            0% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            }

            50% {
                box-shadow: 0 0 60px rgba(239, 68, 68, 0.5);
            }

            100% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            }
        }

        .no-data {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 7vh;
            color: #94a3b8;
            font-weight: 700;
            gap: 2vh;
        }

        /* Audio Unblock Overlay */
        #unblock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 132, 199, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        #unblock-overlay h2 {
            font-size: 6vh;
            margin-bottom: 2vh;
        }

        #unblock-overlay p {
            font-size: 3vh;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="unblock-overlay" onclick="enableAudio()">
        <h2>點擊螢幕啟用語音廣播</h2>
        <p>Click anywhere to enable sound</p>
    </div>

    <header>
        <div class="title">CAMPUS PICKUP LIVE</div>
        <div id="clock" class="clock">00:00:00</div>
    </header>

    <div id="billboard" class="billboard-container">
        <div class="no-data">🍃 靜候放學廣播中...</div>
    </div>

    <script>
        let lastHistoryHash = "";
        let lastPlayedAudioUrl = "";
        let audioEnabled = false;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function enableAudio() {
            audioEnabled = true;
            document.getElementById('unblock-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('unblock-overlay').style.display = 'none';
            }, 500);

            // Play a silent sound to "warm up" the audio context
            const audio = new Audio();
            audio.play().catch(() => { });
            console.log("Audio enabled");
        }

        async function poll() {
            try {
                const res = await fetch('/api/poll');
                const data = await res.json();
                const currentHash = JSON.stringify(data.history);

                if (currentHash !== lastHistoryHash) {
                    lastHistoryHash = currentHash;
                    updateBillboard(data.history);
                    checkAndPlayAudio(data.history);
                }
            } catch (err) { console.error("Poll error:", err); }
        }

        function updateBillboard(history) {
            const container = document.getElementById('billboard');
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="no-data">🍃 目前無接送資訊</div>';
                return;
            }

            container.innerHTML = history.slice(0, 5).map(item => `
                <div class="row ${item.class || ''}">
                    <div class="student-info">
                        <div class="student-name">${item.name}</div>
                        <div class="status-badge">${item.status}</div>
                    </div>
                    <div class="arrival-time">${item.time}</div>
                </div>
            `).join('');
        }

        function checkAndPlayAudio(history) {
            if (!audioEnabled || !history || history.length === 0) return;

            const latest = history[0];
            // If the latest entry has a new audio URL, play it
            if (latest.audio_url && latest.audio_url !== lastPlayedAudioUrl) {
                console.log("Announcement:", latest.name, latest.status);
                const audio = new Audio(latest.audio_url);
                audio.play().catch(err => console.error("Audio Play Error:", err));
                lastPlayedAudioUrl = latest.audio_url;
            }
        }

        setInterval(poll, 2500);
        poll();
    </script>
</body>

</html>
