<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏫 學生接送管理入口 | 智慧校園系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #FBFBFD;
            --card-bg: #FFFFFF;
            --text: #1D1D1F;
            --text-secondary: #86868B;
            --border: rgba(0, 0, 0, 0.08);
            --radius: 24px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .portal-wrapper {
            max-width: 1000px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 64px;
            animation: fadeIn 1s var(--transition);
        }

        .header h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 240px;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: all 0.5s var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            border-color: var(--primary);
        }

        .card.lg { grid-column: span 2; }
        .card.md { grid-column: span 1; }
        .card.accent { 
            background: linear-gradient(135deg, #007AFF 0%, #00C7BE 100%); 
            color: white; 
            border: none;
        }

        .card .icon {
            font-size: 44px;
            margin-bottom: 20px;
            transition: transform 0.4s var(--transition);
        }

        .card:hover .icon {
            transform: scale(1.15) rotate(5deg);
        }

        .card h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .card.accent p { color: rgba(255, 255, 255, 0.8); }

        .card .badge {
            position: absolute;
            top: 24px;
            right: 24px;
            padding: 6px 12px;
            background: rgba(0, 122, 255, 0.1);
            color: var(--primary);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .card.accent .badge {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .footer {
            text-align: center;
            margin-top: 64px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .bento-grid {
                grid-template-columns: 1fr 1fr;
            }
            .card.lg { grid-column: span 2; }
        }

        @media (max-width: 600px) {
            .bento-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: auto;
            }
            .card.lg, .card.md { grid-column: span 1; }
            .header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="portal-wrapper">
        <header class="header">
            <h1>🏫 智慧接送服務入口</h1>
            <p>Smart Campus Pickup Suite · Apple Ecosystem Aesthetics</p>
        </header>

        <main class="bento-grid">
            <!-- New Introduction Card -->
            <a href="landing" class="card lg accent">
                <div class="badge">了解更多</div>
                <div>
                    <div class="icon">✨</div>
                    <h2>產品功能簡介</h2>
                    <p>探索 AI 擬真語音、LINE 自動化註冊與 GPS 安全校驗等旗艦級功能，提升學校品牌形象。</p>
                </div>
            </a>

            <!-- Monitor Center -->
            <a href="dashboard" class="card md">
                <div class="icon">💻</div>
                <div>
                    <h2>監控中心</h2>
                    <p>管理老師與教務處專用介面。</p>
                </div>
            </a>

            <!-- History -->
            <a href="history" class="card md">
                <div class="icon">📜</div>
                <div>
                    <h2>接送日誌</h2>
                    <p>查看最近 7 天的完整紀錄。</p>
                </div>
            </a>

            <!-- Billboard -->
            <a href="billboard" class="card lg">
                <div class="icon">📢</div>
                <div>
                    <h2>校門口大看板</h2>
                    <p>專為現場學生與家長設計，高對比度的即時播報畫面，支援各類大螢幕設備。</p>
                </div>
            </a>
        </main>

        <footer class="footer">
            &copy; 2026 Schpickup Smart System | Designed with Precision.
        </footer>
    </div>
</body>
</html>
